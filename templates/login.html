{% load static %}
{% include 'header.html' %}

{% comment %} {% if messages %}
<div class="alert alert-danger" role="alert">
    <ul class="messages">
        {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul></div>
{% endif %} {% endcomment %}


    <div class="container" style="width: 50%;">
        <br><br><br><br><br><br><br><br><br><br><br>
        <div class="contact-content">
    <div class="container" >
        
          <form id="contact-form" action="login" method="post">
            {% csrf_token %}
            <div class="row">   
              <div class="col-lg-12">
                <fieldset>
                  <label for="email">Email</label>
                  <input type="text" name="email" id="email" pattern="[^ @]*@[^ @]*" placeholder="Your E-mail..." required="">
                </fieldset>
              </div>
              <div class="col-lg-12">
                <fieldset>
                  <label for="password">Password</label>
                  <input type="text" name="password" id="password"  placeholder="Your Password..." required="">
                </fieldset>
              </div>
              <div class="col-lg-12">
                <fieldset>
                  <button type="submit" id="form-submit" class="orange-button">Login</button>
                </fieldset>
              </div>
              <p class="text-center">not <a style="color: orangered;" href="user_register">registered?</a></p>
            </div>
          </form>
      
    </div>
  </div>
    </div>

{% include 'footer.html' %}
