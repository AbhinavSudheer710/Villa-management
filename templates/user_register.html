{% load static %}
{% include 'header.html' %}


    <div class="container" style="width: 50%;">
        <br><br><br><br><br><br><br><br><br><br><br>
        <div class="contact-content">
    <div class="container" >

          <form id="contact-form" action="user_register" method="post">
             {% csrf_token %}

            <div class="row">
                              <h1 class="text-center">User Register</h1>

              <div class="col-lg-12">
                <fieldset>
                  <label for="name">Name</label>
                  <input type="name" name="name" id="name" placeholder="Your Name..." autocomplete="on" required>
                </fieldset>
              </div>    
              <div class="col-lg-12">
                <fieldset>
                  <label for="email">Email</label>
                  <input type="text" name="email" id="email" pattern="[^ @]*@[^ @]*" placeholder="Your E-mail..." required="">
                </fieldset>
              </div>
              <div class="col-lg-12">
                <fieldset>
                  <label for="phone">Phone</label>
                  <input type="text" name="phone" id="phone"  placeholder="Your Phone..." required="">
                </fieldset>
              </div>
              <br>
              
              <div class="col-lg-12">
                <fieldset>
                  <label for="password">Password</label>
                  <input type="text" name="password" id="password"  placeholder="Your Password..." required="">
                </fieldset>
              </div>
              <div class="col-lg-12">
                <fieldset>
                  <button type="submit" id="form-submit" class="orange-button">Register</button>
                </fieldset>
              </div>
              <a class="text-center" style="color: orangered;" href="login">I already have an account</a>
            </div>
          </form>
      
    </div>
  </div>
    </div>

{% include 'footer.html' %}
